# Configuración de Nginx para Wynwood
# Guardar en: /etc/nginx/sites-available/wynwood.jean-rivas.com

server {
    listen 80;
    server_name wynwood.jean-rivas.com;

    client_max_body_size 20M;

    access_log /var/log/nginx/wynwood.access.log;
    error_log /var/log/nginx/wynwood.error.log;

    # Backend
    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Archivos Estáticos (Servidos por el contenedor a través de Nginx si se prefiere, 
    # aunque WhiteNoise está activo en Django)
}

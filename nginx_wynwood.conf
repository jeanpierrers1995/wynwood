server {
    listen 443 ssl http2;
    server_name wynwood.jean-rivas.com;

    ssl_certificate /etc/letsencrypt/live/wynwood.jean-rivas.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wynwood.jean-rivas.com/privkey.pem;

    client_max_body_size 20M;

    access_log /var/log/nginx/wynwood.access.log;
    error_log /var/log/nginx/wynwood.error.log;

    location /static/ {
        alias /var/lib/docker/volumes/wynwood_wynwood_static_volume/_data/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /var/lib/docker/volumes/wynwood_wynwood_media_volume/_data/;
        expires 30d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

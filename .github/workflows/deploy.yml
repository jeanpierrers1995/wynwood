name: Deploy Wynwood to Production

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up SSH
      uses: webfactory/ssh-agent@v0.7.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Add Server to Known Hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -H ${{ secrets.SSH_HOST_PRODUCTION }} >> ~/.ssh/known_hosts

    - name: Deploy to Server
      env:
        SSH_USER: ${{ secrets.SSH_USER }}
        SSH_HOST: ${{ secrets.SSH_HOST_PRODUCTION }}
      run: |
        scp docker-compose.prod.yml nginx_wynwood.conf $SSH_USER@$SSH_HOST:~/wynwood-prod/
        
        ssh $SSH_USER@$SSH_HOST << 'EOF'
          cd ~/wynwood-prod
          chmod +x deploy.sh || true
          
          docker compose -f docker-compose.prod.yml build --no-cache
          docker compose -f docker-compose.prod.yml up -d
          
          sleep 15
          
          docker exec wynwood-backend python manage.py migrate --noinput
          docker exec wynwood-backend python manage.py collectstatic --noinput
          
          sudo cp nginx_wynwood.conf /etc/nginx/sites-available/wynwood.jean-rivas.com
          sudo ln -sf /etc/nginx/sites-available/wynwood.jean-rivas.com /etc/nginx/sites-enabled/
          sudo nginx -t && sudo systemctl reload nginx
          
          docker image prune -f
        EOF
